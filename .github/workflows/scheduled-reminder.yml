name: Scheduled Reminder

on:
  schedule:
    # Runs every day at 9:00 AM UTC
    - cron: '0 9 * * *'
  # Allow manual triggering for testing
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Post daily reminder
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📅 Daily Standup Reminder - ${new Date().toLocaleDateString()}`,
              body: `Good morning! 🌟\n\nThis is your daily reminder to:\n- Review open PRs\n- Check assigned issues\n- Update your progress\n\nHave a productive day! 🚀`
            });
            
            console.log(`Issue created: ${issue.data.html_url}`);
